<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Психолог | VK Mini App</title>
    
    <!-- VK Mini Apps (Добавили мозги ВКонтакте!) -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <!-- 🚀 СУПЕР-БЫСТРАЯ ИНИЦИАЛИЗАЦИЯ ВК 🚀 -->
    <!-- Она срабатывает мгновенно, до того как загрузится тяжелый React и Babel -->
    <script>
        if (window.vkBridge) {
            window.vkBridge.send('VKWebAppInit')
                .then(() => {
                    console.log('VK Mini App успешно инициализировано (Fast Track)!');
                })
                .catch(error => {
                    console.error('Ошибка инициализации VK:', error);
                });
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: '#A3B1A6',
                        'sage-light': '#D6DDD8',
                        sand: '#F4F1EA',
                        cream: '#FCFBFA',
                        graphite: '#363636',
                    },
                    fontFamily: {
                        serif: ['Lora', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 32px -8px rgba(163, 177, 166, 0.3)',
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.05)',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* 🛠 ВАЙБОВЫЙ ФИКС 2: Жесткая фиксация экрана (убираем "резинку" и прыжки) */
        html, body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            background-color: #F4F1EA;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #root {
            height: 100%;
            width: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        /* Оставляем возможность писать текст в форме отзывов */
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }
        /* Убираем скроллбар для эстетики карусели */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-panel {
            background: rgba(252, 251, 250, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="text-graphite font-sans antialiased overflow-x-hidden" oncontextmenu="return false;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Lucide Icons (SVG) ---
        const Heart = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const Leaf = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const Sparkles = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const MessageCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
        const X = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Calendar = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const QrCode = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>;

        // ==========================================
        // 🛠 БЛОК НАСТРОЕК (МЕНЯТЬ ТОЛЬКО ЗДЕСЬ) 🛠
        // ==========================================
        const CONFIG = {
            // 1. Главный экран (Hero)
            hero: {
                name: "Елена Сотникова",
                description: "Помогаю обрести внутреннюю опору и гармонию",
                photoUrl: "https://i.postimg.cc/pVjVpSp7/unnamed-(2).jpg",
            },
            
            // 2. Ссылки
            links: {
                vk: "https://vk.com/im?sel=-12345678", // Для записи и кнопки "Написать мне"
                vkGroup: "https://vk.com/public12345678", // Ссылка для кнопки "Мой канал"
                qrCodeUrl: "https://i.postimg.cc/tgyzs0Sj/Remove-background-project-(1).png", // ⭐️ Ссылка на картинку с QR-кодом
                freebieUrl: "#", // Ссылка на пост/файл
                freebieTitle: "Полезное (Free)",
                freebieSubtitle: "Гайд \"Снижение тревожности\"",
            },

            // ==========================================
            // ⭐️ НОВЫЙ РАЗДЕЛ: ПОЛЕЗНОЕ (ЛИД-МАГНИТЫ) ⭐️
            // Добавляй свои гайды сюда. Если хочешь добавить еще один — просто 
            // скопируй блок в фигурных скобках {...} и вставь через запятую!
            // ==========================================
            freebies: [
                { 
                    title: "Гайд по самопомощи", 
                    subtitle: "Снижение тревожности за 10 минут", 
                    url: "https://vk.com/wall-12345678_1" // Ссылка на пост с гайдом
                },
                { 
                    title: "Медитация на сон", 
                    subtitle: "Аудио-практика для глубокого расслабления", 
                    url: "https://vk.com/wall-12345678_2" // Ссылка на аудио/пост
                },
                { 
                    title: "Тест на уровень стресса", 
                    subtitle: "Узнай свое состояние прямо сейчас", 
                    url: "https://vk.com/app123456" // Ссылка на мини-приложение или тест
                },
                { 
                    title: "Чек-лист: Личные границы", 
                    subtitle: "Как говорить «нет» без чувства вины", 
                    url: "https://vk.com/wall-12345678_4" 
                }
            ],

            // 3. Блок "Обо мне"
            about: {
                title: "Обо мне",
                paragraphs: [
                    "Я дипломированный психолог с опытом более 5 лет.",
                    "Моя главная цель — помочь вам найти внутренние ресурсы и обрести гармонию в отношениях с собой и миром.",
                    "Работаю в интегративном подходе, бережно и без осуждения."
                ],
                quote: "Всё самое важное уже есть внутри вас. Моя задача — помочь вам это услышать."
            },

            // 4. Эмоции (State Checker)
            supportMessages: {
                "😔": ["Грустить — это нормально. Дай себе время.", "Я рядом. Этот период пройдет."],
                "😠": ["Злость — это твоя защитная реакция. Ты имеешь на нее право.", "Вдох-выдох. Твои границы важны."],
                "😰": ["Тревога пытается тебя защитить, но сейчас ты в безопасности.", "Сфокусируйся на дыхании. Ты справишься."],
                "😴": ["Усталость говорит о том, что пора отдохнуть. Позволь себе паузу.", "Твое тело просит заботы. Прислушайся к нему."]
            },

            // 5. Экспертиза (С чем я работаю)
            expertise: [
                { title: "Тревожность", message: "Помогу снизить уровень тревоги, найти внутреннюю опору и вернуть контроль над эмоциями." },
                { title: "Выгорание", message: "Вместе найдем источники энергии, восстановим баланс и научимся отдыхать." },
                { title: "Отношения", message: "Научимся выстраивать здоровые границы, слышать друг друга и выходить из созависимости." },
                { title: "Самооценка", message: "Помогу заглушить внутреннего критика и бережно полюбить себя." }
            ],

            // 6. Формат и стоимость
            pricing: [
                { title: "Индивидуальная онлайн-сессия", duration: "55 минут", price: "3 500 ₽" },
                { title: "Пакет из 4 сессий", duration: "1 месяц", price: "12 000 ₽" },
                { title: "Текстовая консультация", duration: "3 дня", price: "1 500 ₽" }
            ],

            // 7. Отзывы (Базовые, пока не подключена таблица)
            defaultReviews: [
                { id: 1, name: "Анна", text: "Очень комфортно работать! Почувствовала легкость уже после первой сессии. Спасибо за бережное отношение.", rating: 5 },
                { id: 2, name: "Михаил", text: "Помогли мне справиться с тяжелым периодом и паническими атаками. Отличный специалист.", rating: 5 },
                { id: 3, name: "Ксения", text: "Никогда не думала, что онлайн-формат может быть таким теплым и эффективным.", rating: 5 }
            ],

            // 8. База данных (Опционально)
            googleSheetUrl: "", // Ссылка на твою таблицу
            googleScriptUrl: "" // Ссылка на скрипт для отправки
        };
        // ==========================================
        // КОНЕЦ БЛОКА НАСТРОЕК
        // ==========================================

        const vk = window.vkBridge; // ВАЙБОВЫЙ ФИКС: Подключили VK

        const App = () => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedMood, setSelectedMood] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState("");
            
            // ВАЙБОВЫЙ ФИКС: Добавили потерянное состояние для окна Полезного
            const [isFreebiesOpen, setIsFreebiesOpen] = useState(false);
            
            // Новое состояние для окна Стоимости
            const [isPricingOpen, setIsPricingOpen] = useState(false);
            
            // ВАЙБОВЫЙ ФИКС: Новое состояние для окна QR-кода
            const [isQrOpen, setIsQrOpen] = useState(false);
            
            // Новые состояния для лоадера и отзывов
            const [isLoading, setIsLoading] = useState(true);
            const [reviews, setReviews] = useState([]);
            const [isReviewFormOpen, setIsReviewFormOpen] = useState(false);
            const [reviewForm, setReviewForm] = useState({ name: '', text: '', rating: 5 });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState(null);
            const [activeExpertise, setActiveExpertise] = useState(null);

            // Состояние для обработки свайпа (Swipe Back)
            const [touchStartXY, setTouchStartXY] = useState({x: 0, y: 0});

            // 3. Легкая вибрация (Только VK)
            const triggerHaptic = () => {
                if (vk) {
                    vk.send('VKWebAppTapticImpactOccurred', { style: 'light' }).catch(() => {});
                }
            };

            // (Старый useEffect с инициализацией внутри React удален, так как мы вынесли его наверх)

            // 🛠 ВАЙБОВЫЙ ФИКС 1: Блокировка скролла фона при открытых модалках
            useEffect(() => {
                if (isModalOpen || isReviewFormOpen || isFreebiesOpen || isPricingOpen || isQrOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
                return () => { document.body.style.overflow = ''; };
            }, [isModalOpen, isReviewFormOpen, isFreebiesOpen, isPricingOpen, isQrOpen]);

            // 🛠 ВАЙБОВЫЙ ФИКС 3: Обработчики свайпа вправо (Touch Events для модалок)
            const onTouchStart = (e) => {
                setTouchStartXY({
                    x: e.targetTouches[0].clientX,
                    y: e.targetTouches[0].clientY
                });
            };

            const onTouchEnd = (e, closeFn) => {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const dx = touchEndX - touchStartXY.x;
                const dy = Math.abs(touchEndY - touchStartXY.y);
                
                // Если провели вправо больше чем на 70px и палец не ушел сильно вверх-вниз (защита от скролла)
                if (dx > 70 && dy < 50) { 
                    triggerHaptic();
                    closeFn();
                }
            };

            // Эффект загрузки данных при старте (Чтение напрямую из Google Таблицы)
            useEffect(() => {
                if (CONFIG.googleSheetUrl) {
                    // Достаем ID таблицы из ссылки
                    const match = CONFIG.googleSheetUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                    if (match && match[1]) {
                        const sheetId = match[1];
                        const sheetName = encodeURIComponent("Опубликованные отзывы");
                        const timestamp = new Date().getTime(); // Антикэш
                        
                        // Специальная ссылка Google API для прямого чтения таблиц (вайб-кодерский трюк!)
                        const fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}&t=${timestamp}`;

                        fetch(fetchUrl, { cache: 'no-store' })
                            .then(res => res.text())
                            .then(text => {
                                // Очищаем ответ от лишних символов Google
                                const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                                const data = JSON.parse(jsonStr);
                                const rows = data.table.rows;
                                const loadedReviews = [];

                                rows.forEach((row, idx) => {
                                    // Проверяем, что в строке есть имя (0 колонка) и текст (2 колонка)
                                    if (row.c && row.c[0] && row.c[2]) {
                                        const name = row.c[0].v;
                                        const textVal = row.c[2].v;
                                        
                                        // Игнорируем заголовки, если они попали в данные
                                        if (textVal && textVal.toLowerCase() !== "текст" && name !== "Имя") {
                                            loadedReviews.push({
                                                id: idx,
                                                name: name || "Аноним",
                                                text: textVal,
                                                // Оценка в 4 колонке (индекс 3)
                                                rating: row.c[3] ? parseInt(row.c[3].v) : 5 
                                            });
                                        }
                                    }
                                });

                                if (loadedReviews.length > 0) {
                                    setReviews(loadedReviews.reverse()); // Свежие наверх
                                } else {
                                    setReviews(CONFIG.defaultReviews);
                                }
                            })
                            .catch(err => {
                                console.warn("⚠️ Не удалось загрузить из таблицы напрямую. Показываем дефолтные.");
                                setReviews(CONFIG.defaultReviews);
                            })
                            .finally(() => setIsLoading(false));
                        return; // Завершаем, чтобы не пошло дальше
                    }
                }
                
                // Если ссылки на таблицу нет
                setReviews(CONFIG.defaultReviews);
                setIsLoading(false);
            }, []);

            // Отправка нового отзыва
            const handleReviewSubmit = (e) => {
                e.preventDefault();
                triggerHaptic();
                if (!CONFIG.googleScriptUrl) {
                    setSubmitStatus('error_no_url');
                    return;
                }
                
                setIsSubmitting(true);
                
                // Подготавливаем данные именно так, как ждет твой скрипт (e.parameter)
                const formData = new URLSearchParams();
                formData.append('reviewer_name', reviewForm.name);
                formData.append('reviewer_text', reviewForm.text);
                formData.append('reviewer_rating', reviewForm.rating);

                fetch(CONFIG.googleScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                })
                .then(() => {
                    setSubmitStatus('success');
                    setReviewForm({ name: '', text: '', rating: 5 });
                    // Закрываем форму через 3 секунды после успеха
                    setTimeout(() => {
                        setIsReviewFormOpen(false);
                        setSubmitStatus(null);
                    }, 3000);
                })
                .catch(() => setSubmitStatus('error'))
                .finally(() => setIsSubmitting(false));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 relative selection:bg-sage/30">
                    
                    {/* Кнопка QR-кода (Перенесена влево для ВК) */}
                    <button 
                        onClick={() => { triggerHaptic(); setIsQrOpen(true); }}
                        className="absolute top-6 left-6 glass-panel p-3 rounded-full text-sage hover:text-graphite transition-all active:scale-95 shadow-md z-50"
                    >
                        <QrCode className="w-6 h-6" />
                    </button>

                    {/* Header / Hero */}
                    <header className="px-6 pt-12 pb-6 flex flex-col items-center text-center opacity-0 animate-fade-in-up">
                        <div className="relative mb-6">
                            <div className="w-32 h-32 rounded-full overflow-hidden shadow-soft border-4 border-white">
                                <img 
                                    src={CONFIG.hero.photoUrl} 
                                    alt="" 
                                    className="w-full h-full object-cover"
                                />
                            </div>
                            <div className="absolute -bottom-2 -right-2 bg-sage text-white p-2 rounded-full shadow-md animate-pulse-slow">
                                <Leaf className="w-4 h-4" />
                            </div>
                        </div>
                        <h1 className="font-serif text-3xl mb-2 text-graphite tracking-tight">{CONFIG.hero.name}</h1>
                        <p className="text-sm text-graphite/70 font-light max-w-[240px] leading-relaxed">
                            {CONFIG.hero.description}
                        </p>
                    </header>

                    {/* State Checker (Unique Feature) */}
                    <section className="px-6 mb-8 opacity-0 animate-fade-in-up" style={{ animationDelay: '100ms' }}>
                        <div className="glass-panel rounded-[2rem] p-6 shadow-glass text-center transition-all duration-300">
                            {!selectedMood ? (
                                <div>
                                    <h3 className="font-serif text-lg mb-4 text-graphite">Как ты сейчас?</h3>
                                    <div className="flex justify-center gap-6">
                                        {Object.keys(CONFIG.supportMessages).map((emoji) => (
                                            <button 
                                                key={emoji}
                                                onClick={() => { 
                                                    triggerHaptic(); 
                                                    const messages = CONFIG.supportMessages[emoji];
                                                    const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                                                    setSelectedMood(emoji); 
                                                    setSelectedMessage(randomMsg);
                                                }}
                                                className="text-4xl transition-transform active:scale-90 hover:scale-110"
                                            >
                                                {emoji}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-fade-in-up">
                                    <p className="text-sm italic text-graphite/80 leading-relaxed mb-4">
                                        "{selectedMessage}"
                                    </p>
                                    <button 
                                        onClick={() => { triggerHaptic(); setSelectedMood(null); setSelectedMessage(""); }}
                                        className="text-xs text-sage border-b border-sage/30 pb-0.5 uppercase tracking-wider font-medium"
                                    >
                                        Вернуться
                                    </button>
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Interactive Buttons */}
                    <section className="px-6 mb-8 grid grid-cols-2 gap-4 opacity-0 animate-fade-in-up" style={{ animationDelay: '200ms' }}>
                        <button 
                            onClick={() => { triggerHaptic(); setIsModalOpen(true); }}
                            className="glass-panel p-5 rounded-[2rem] flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform"
                        >
                            <div className="bg-sand p-3 rounded-full text-sage">
                                <Heart className="w-6 h-6" />
                            </div>
                            <span className="font-medium text-sm">Обо мне</span>
                        </button>
                        
                        <button 
                            onClick={() => { triggerHaptic(); setIsPricingOpen(true); }}
                            className="glass-panel p-5 rounded-[2rem] flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform"
                        >
                            <div className="bg-sand p-3 rounded-full text-sage">
                                <Calendar className="w-6 h-6" />
                            </div>
                            <span className="font-medium text-sm text-center leading-tight">Формат и<br/>стоимость</span>
                        </button>

                        <div className="col-span-2 glass-panel p-6 rounded-[2rem] transition-all duration-300">
                            <h3 className="font-serif text-lg mb-4 flex items-center gap-2">
                                <Sparkles className="w-5 h-5 text-sage" />
                                С чем я работаю
                            </h3>
                            <div className="flex flex-wrap gap-2">
                                {CONFIG.expertise.map((item, idx) => (
                                    <button 
                                        key={idx} 
                                        onClick={() => { triggerHaptic(); setActiveExpertise(activeExpertise === idx ? null : idx); }}
                                        className={`text-xs px-4 py-2 rounded-full border transition-all duration-300 active:scale-95 ${activeExpertise === idx ? 'bg-sage text-white border-sage shadow-soft' : 'bg-white/60 text-graphite/80 border-white hover:bg-white/80'}`}
                                    >
                                        {item.title}
                                    </button>
                                ))}
                            </div>
                            {activeExpertise !== null && (
                                <div className="mt-4 p-4 bg-sage/10 rounded-2xl border border-sage/20 animate-fade-in-up">
                                    <p className="text-sm font-light text-graphite/80 leading-relaxed italic">
                                        "{CONFIG.expertise[activeExpertise].message}"
                                    </p>
                                </div>
                            )}
                        </div>

                        {/* КНОПКА ПОЛЕЗНОЕ (Теперь открывает меню лид-магнитов) */}
                        <button 
                            onClick={() => { triggerHaptic(); setIsFreebiesOpen(true); }}
                            className="col-span-2 bg-sage text-white p-5 rounded-[2rem] flex items-center justify-between active:scale-95 transition-transform shadow-soft w-full"
                        >
                            <div className="text-left">
                                <span className="block font-serif text-lg mb-1">Полезное (Free)</span>
                                <span className="block text-xs text-white/80 font-light">Гайды, медитации и тесты</span>
                            </div>
                            <div className="bg-white/20 p-2 rounded-full">
                                <Leaf className="w-5 h-5" />
                            </div>
                        </button>
                    </section>

                    {/* Reviews Carousel & Submit Form */}
                    <section className="mb-8 opacity-0 animate-fade-in-up" style={{ animationDelay: '300ms' }}>
                        <div className="flex justify-between items-end px-6 mb-4">
                            <h2 className="font-serif text-xl text-graphite">Отзывы</h2>
                            <button 
                                onClick={() => { triggerHaptic(); setIsReviewFormOpen(true); }} 
                                className="text-xs text-sage border-b border-sage/30 pb-0.5 hover:text-graphite transition-colors"
                            >
                                Оставить отзыв
                            </button>
                        </div>
                        {isLoading ? (
                            <div className="px-6 pb-4 text-sm text-sage flex items-center gap-2">
                                <div className="w-4 h-4 rounded-full border-2 border-sage-light border-t-sage animate-spin"></div>
                                Загружаем отзывы...
                            </div>
                        ) : (
                            <div className="flex gap-4 overflow-x-auto snap-x px-6 pb-4 no-scrollbar">
                                {reviews.map((review, index) => (
                                    <div key={review.id || index} className="snap-center shrink-0 w-64 glass-panel p-5 rounded-[2rem]">
                                        <div className="flex mb-2">
                                            {[...Array(5)].map((_, i) => (
                                                <svg key={i} className={`w-4 h-4 ${i < (review.rating || 5) ? 'fill-current text-sage' : 'fill-current text-sage-light'}`} viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                            ))}
                                        </div>
                                        <p className="text-sm text-graphite/80 font-light leading-relaxed mb-3">"{review.text}"</p>
                                        <span className="text-xs font-medium text-graphite">{review.name}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {/* Эстетичная плашка про разрешение клиентов */}
                        <div className="text-center px-6 flex justify-center items-center gap-1.5 mt-1">
                            <Heart className="w-3 h-3 text-sage/60" />
                            <p className="text-[11px] text-graphite/50 font-light italic">
                                Все отзывы опубликованы с разрешения клиентов
                            </p>
                        </div>
                    </section>

                    {/* CTA Bottom Buttons (Fixed) */}
                    <div className="fixed bottom-6 left-0 right-0 px-6 max-w-md mx-auto z-40 flex gap-3">
                        <a 
                            href={CONFIG.links.vk}
                            target="_blank"
                            onClick={triggerHaptic}
                            className="glass-panel border-sage/20 shadow-soft flex-1 py-3.5 rounded-full flex items-center justify-center text-graphite font-medium active:scale-95 transition-transform text-sm"
                        >
                            Написать мне
                        </a>
                        <a 
                            href={CONFIG.links.vkGroup}
                            target="_blank"
                            onClick={triggerHaptic}
                            className="bg-sage text-white shadow-soft flex-1 py-3.5 rounded-full flex items-center justify-center font-medium active:scale-95 transition-transform text-sm"
                        >
                            Мой канал
                        </a>
                    </div>

                    {/* About Modal */}
                    {isModalOpen && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-graphite/20 backdrop-blur-sm animate-fade-in-up"
                            onTouchStart={onTouchStart}
                            onTouchEnd={(e) => onTouchEnd(e, () => setIsModalOpen(false))}
                        >
                            <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-8 relative shadow-2xl border-white" onClick={e => e.stopPropagation()}>
                                <button 
                                    onClick={() => { triggerHaptic(); setIsModalOpen(false); }}
                                    className="absolute top-6 right-6 text-graphite/50 hover:text-graphite transition-colors bg-white/50 p-2 rounded-full"
                                >
                                    <X className="w-5 h-5" />
                                </button>
                                
                                <h2 className="font-serif text-2xl mb-4 text-graphite">{CONFIG.about.title}</h2>
                                <div className="space-y-4 text-sm font-light text-graphite/80 leading-relaxed max-h-[60vh] overflow-y-auto no-scrollbar pr-2 overscroll-contain">
                                    {CONFIG.about.paragraphs.map((p, idx) => (
                                        <p key={idx}>{p}</p>
                                    ))}
                                    <div className="bg-sage/10 p-4 rounded-2xl mt-6 border border-sage/20">
                                        <p className="font-medium text-sage text-center italic">"{CONFIG.about.quote}"</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* QR-код Modal */}
                    {isQrOpen && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-graphite/20 backdrop-blur-sm animate-fade-in-up"
                            onTouchStart={onTouchStart}
                            onTouchEnd={(e) => onTouchEnd(e, () => setIsQrOpen(false))}
                        >
                            <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-8 relative shadow-2xl border-white text-center" onClick={e => e.stopPropagation()}>
                                <button 
                                    onClick={() => { triggerHaptic(); setIsQrOpen(false); }}
                                    className="absolute top-6 right-6 text-graphite/50 hover:text-graphite transition-colors bg-white/50 p-2 rounded-full"
                                >
                                    <X className="w-5 h-5" />
                                </button>
                                
                                <h2 className="font-serif text-2xl mb-6 text-graphite flex items-center justify-center gap-2">
                                    <QrCode className="w-6 h-6 text-sage" />
                                    Мой канал
                                </h2>
                                
                                <img 
                                    src={CONFIG.links.qrCodeUrl} 
                                    alt="" 
                                    className="w-full max-w-[280px] h-auto object-contain drop-shadow-xl mb-6 mx-auto"
                                />
                                
                                <p className="text-sm font-light text-graphite/80 leading-relaxed italic px-2">
                                    Отсканируй, чтобы не потерять уютный канал ✨
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Написать отзыв Modal */}
                    {isReviewFormOpen && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-graphite/20 backdrop-blur-sm animate-fade-in-up"
                            onTouchStart={onTouchStart}
                            onTouchEnd={(e) => onTouchEnd(e, () => setIsReviewFormOpen(false))}
                        >
                            <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-8 relative shadow-2xl border-white" onClick={e => e.stopPropagation()}>
                                <button 
                                    onClick={() => { triggerHaptic(); setIsReviewFormOpen(false); }}
                                    className="absolute top-6 right-6 text-graphite/50 hover:text-graphite transition-colors bg-white/50 p-2 rounded-full"
                                >
                                    <X className="w-5 h-5" />
                                </button>
                                
                                <h2 className="font-serif text-2xl mb-4 text-graphite">Оставить отзыв</h2>
                                
                                {submitStatus === 'success' ? (
                                    <div className="text-center py-6 animate-fade-in-up">
                                        <div className="bg-sage/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <Heart className="w-8 h-8 text-sage" />
                                        </div>
                                        <p className="text-graphite/80 text-sm">Благодарю! Твои слова отправлены, скоро они появятся здесь.</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleReviewSubmit} className="space-y-4">
                                        <div className="flex justify-center gap-2 mb-2">
                                            {[1, 2, 3, 4, 5].map(star => (
                                                <svg 
                                                    key={star} 
                                                    onClick={() => { triggerHaptic(); setReviewForm({...reviewForm, rating: star}); }}
                                                    className={`w-8 h-8 cursor-pointer transition-colors ${reviewForm.rating >= star ? 'text-sage fill-current' : 'text-sage-light fill-current'}`} 
                                                    viewBox="0 0 20 20"
                                                >
                                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                                        </svg>
                                    ))}
                                </div>
                                <input 
                                    required 
                                    type="text" 
                                    placeholder="Твоё имя" 
                                    className="w-full bg-white/60 border border-white rounded-2xl px-4 py-3 text-[16px] focus:outline-none focus:ring-2 focus:ring-sage/50 text-graphite"
                                    value={reviewForm.name}
                                    onChange={e => setReviewForm({...reviewForm, name: e.target.value})}
                                />
                                <textarea 
                                    required 
                                    placeholder="Поделись своими чувствами и впечатлениями..." 
                                    rows="4"
                                    className="w-full bg-white/60 border border-white rounded-2xl px-4 py-3 text-[16px] focus:outline-none focus:ring-2 focus:ring-sage/50 resize-none text-graphite"
                                    value={reviewForm.text}
                                    onChange={e => setReviewForm({...reviewForm, text: e.target.value})}
                                ></textarea>
                                
                                {submitStatus === 'error_no_url' && <p className="text-red-400 text-xs text-center">Сначала подключи Google Script в настройках кода.</p>}
                                        {submitStatus === 'error' && <p className="text-red-400 text-xs text-center">Произошла ошибка, попробуй позже.</p>}
                                        
                                        <button 
                                            disabled={isSubmitting}
                                            type="submit" 
                                            className="w-full bg-sage text-white py-3 rounded-full font-medium shadow-soft active:scale-95 transition-transform disabled:opacity-70 mt-2 flex items-center justify-center gap-2"
                                        >
                                            {isSubmitting ? 'Отправляем...' : 'Отправить'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Модальное окно "Полезное" */}
                    {isFreebiesOpen && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-graphite/20 backdrop-blur-sm animate-fade-in-up"
                            onTouchStart={onTouchStart}
                            onTouchEnd={(e) => onTouchEnd(e, () => setIsFreebiesOpen(false))}
                        >
                            <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-8 relative shadow-2xl border-white" onClick={e => e.stopPropagation()}>
                                <button 
                                    onClick={() => { triggerHaptic(); setIsFreebiesOpen(false); }}
                                    className="absolute top-6 right-6 text-graphite/50 hover:text-graphite transition-colors bg-white/50 p-2 rounded-full"
                                >
                                    <X className="w-5 h-5" />
                                </button>
                                
                                <h2 className="font-serif text-2xl mb-4 text-graphite">Полезное</h2>
                                <div className="space-y-3 max-h-[60vh] overflow-y-auto no-scrollbar pr-2 overscroll-contain">
                                    {CONFIG.freebies.map((item, idx) => (
                                        <a 
                                            key={idx}
                                            href={item.url}
                                            target="_blank"
                                            onClick={triggerHaptic}
                                            className="block p-4 rounded-2xl border border-sage/20 bg-white/60 hover:bg-white/80 transition-colors active:scale-95"
                                        >
                                            <h3 className="font-medium text-graphite mb-1">{item.title}</h3>
                                            <p className="text-xs text-graphite/70 font-light">{item.subtitle}</p>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Модальное окно "Формат и стоимость" */}
                    {isPricingOpen && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-graphite/20 backdrop-blur-sm animate-fade-in-up"
                            onTouchStart={onTouchStart}
                            onTouchEnd={(e) => onTouchEnd(e, () => setIsPricingOpen(false))}
                        >
                            <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-8 relative shadow-2xl border-white" onClick={e => e.stopPropagation()}>
                                <button 
                                    onClick={() => { triggerHaptic(); setIsPricingOpen(false); }}
                                    className="absolute top-6 right-6 text-graphite/50 hover:text-graphite transition-colors bg-white/50 p-2 rounded-full"
                                >
                                    <X className="w-5 h-5" />
                                </button>
                                
                                <h2 className="font-serif text-2xl mb-4 text-graphite">Формат и стоимость</h2>
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto no-scrollbar pr-2 overscroll-contain">
                                    {CONFIG.pricing.map((item, idx) => (
                                        <div key={idx} className="p-4 rounded-2xl border border-sage/20 bg-white/60 flex justify-between items-center">
                                            <div>
                                                <h3 className="font-medium text-graphite">{item.title}</h3>
                                                <p className="text-xs text-graphite/50 mt-1">{item.duration}</p>
                                            </div>
                                            <div className="font-serif text-lg text-sage font-medium whitespace-nowrap ml-4">
                                                {item.price}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                <a 
                                    href={CONFIG.links.vk}
                                    target="_blank"
                                    onClick={triggerHaptic}
                                    className="mt-6 w-full bg-sage text-white py-3 rounded-full font-medium shadow-soft active:scale-95 transition-transform flex items-center justify-center text-sm"
                                >
                                    Записаться
                                </a>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
